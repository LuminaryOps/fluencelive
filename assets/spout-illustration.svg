<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="spout-illo-title">
  <title id="spout-illo-title">Two apps exchanging live GPU textures, bidirectionally.</title>
  <defs>
    <linearGradient id="fl-warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="fl-warm-soft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Left app window -->
  <rect x="50" y="80" width="140" height="140" rx="12" fill="url(#fl-warm-soft)" stroke="url(#fl-warm)" stroke-width="2.5"/>
  <line x1="50" y1="108" x2="190" y2="108" stroke="url(#fl-warm)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="64" cy="94" r="3" fill="url(#fl-warm)"/>
  <circle cx="76" cy="94" r="3" fill="url(#fl-warm)" opacity="0.5"/>
  <circle cx="88" cy="94" r="3" fill="url(#fl-warm)" opacity="0.3"/>
  <!-- "viewport" content: flowing waves -->
  <path d="M 65 135 Q 95 120 125 135 T 175 140" fill="none" stroke="url(#fl-warm)" stroke-width="2.5" opacity="0.85"/>
  <path d="M 65 160 Q 95 145 125 160 T 175 165" fill="none" stroke="url(#fl-warm)" stroke-width="2" opacity="0.55"/>
  <path d="M 65 185 Q 95 170 125 185 T 175 190" fill="none" stroke="url(#fl-warm)" stroke-width="2" opacity="0.3"/>

  <!-- Right app window -->
  <rect x="290" y="80" width="140" height="140" rx="12" fill="url(#fl-warm-soft)" stroke="url(#fl-warm)" stroke-width="2.5"/>
  <line x1="290" y1="108" x2="430" y2="108" stroke="url(#fl-warm)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="304" cy="94" r="3" fill="url(#fl-warm)"/>
  <circle cx="316" cy="94" r="3" fill="url(#fl-warm)" opacity="0.5"/>
  <circle cx="328" cy="94" r="3" fill="url(#fl-warm)" opacity="0.3"/>
  <!-- "viewport" content: concentric rings (different visual to suggest a different app) -->
  <circle cx="360" cy="160" r="36" fill="none" stroke="url(#fl-warm)" stroke-width="2" opacity="0.3"/>
  <circle cx="360" cy="160" r="24" fill="none" stroke="url(#fl-warm)" stroke-width="2" opacity="0.55"/>
  <circle cx="360" cy="160" r="12" fill="none" stroke="url(#fl-warm)" stroke-width="2" opacity="0.85"/>
  <circle cx="360" cy="160" r="4" fill="url(#fl-warm)"/>

  <!-- Top arrow: left -> right -->
  <line x1="195" y1="135" x2="280" y2="135" stroke="url(#fl-warm)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="270,127 285,135 270,143" fill="none" stroke="url(#fl-warm)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom arrow: right -> left -->
  <line x1="285" y1="165" x2="200" y2="165" stroke="url(#fl-warm)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="210,157 195,165 210,173" fill="none" stroke="url(#fl-warm)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
